<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open in Chrome</title>
<style>
body{
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    text-align:center;
    padding:20px;
}
.box{
    max-width:400px;
}
button{
    padding:12px 24px;
    font-size:18px;
}
</style>
</head>
<body>

<div class="box">
    <h2>⚠ Best Experience in Chrome</h2>
    <p>This website works best in Chrome or your phone's default browser.</p>
    <p>Tap <b>⋮</b> in the top-right corner, then select <b>Open in browser</b>.</p>

    <button onclick="location.href='https://surprise-self-five.vercel.app/'">
        Continue Anyway
    </button>
</div>

<script>
const ua = navigator.userAgent.toLowerCase();

if (!(ua.includes("instagram") || ua.includes("fban") || ua.includes("fbav"))) {
    location.href = "https://surprise-self-five.vercel.app/";
}
</script>

</body>
</html>
